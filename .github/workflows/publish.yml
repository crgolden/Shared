name: Build, test, and publish Shared package

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    if: github.actor != 'dependabot[bot]'
    name: Build and analyze
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # GitVersion and Sonar both need full history

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache dotnet global tools
        id: cache-dotnet-tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-dotnet-tools-

      - name: Restore local tools
        run: dotnet tool restore

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /o:"$env:SONAR_ORGANIZATION" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.opencover.reportsPaths="coverage.opencover.xml" `
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.png" `
            /d:sonar.scanner.skipJreProvisioning=true

      - name: Restore
        run: dotnet restore Shared.slnx

      - name: Build
        run: dotnet build Shared.slnx --no-restore --configuration Release

      - name: Run unit tests with coverage
        run: |
          dotnet coverlet Shared.Tests.Unit\bin\Release\net10.0 `
            --target "dotnet" `
            --targetargs "test --project Shared.Tests.Unit --no-build --configuration Release -- --filter-trait Category=Unit --report-xunit-trx --report-xunit-trx-filename unit-tests.trx" `
            --format opencover --output "coverage.opencover.xml" `
            --skipautoprops `
            --exclude-by-attribute GeneratedCodeAttribute `
            --exclude-by-file "**/obj/**" `
            --does-not-return-attribute DoesNotReturnAttribute `
            --include "[Shared]*"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: Shared.Tests.Unit/bin/Release/net10.0/TestResults/

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

  # Every push to main auto-publishes a preview build — the version's base number is GitVersion's
  # next-appropriate-semver bump above the last release tag (default patch, or minor/major/none via
  # +semver: markers in commit messages), suffixed with a preview counter that increments per commit
  # since that tag and resets whenever publish-release below creates a new one.
  publish-preview:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore local tools
        run: dotnet tool restore

      - name: Determine preview version
        id: gitversion
        run: |
          $json = dotnet dotnet-gitversion /output json | Out-String
          $version = ($json | ConvertFrom-Json).SemVer
          Write-Output "semVer=$version" >> $env:GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack Shared/Shared.csproj --configuration Release -p:PackageVersion=${{ steps.gitversion.outputs.semVer }} --output ./nupkg

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $package = Get-ChildItem ./nupkg/*.nupkg | Select-Object -First 1 -ExpandProperty FullName
          dotnet nuget push $package --source "https://nuget.pkg.github.com/crgolden/index.json" --api-key $env:GITHUB_TOKEN --skip-duplicate

  # Manually triggered only. Publishes the exact stable version from Shared.csproj's <Version> (no
  # pre-release suffix) and pushes a matching git tag — that tag is both the "this version was
  # released" record and the reset point for publish-preview's commit-since-last-tag counter.
  publish-release:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Read release version from Shared.csproj
        id: version
        run: |
          $version = dotnet msbuild Shared/Shared.csproj -getProperty:Version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack Shared/Shared.csproj --configuration Release -p:PackageVersion=${{ steps.version.outputs.version }} --output ./nupkg

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $package = Get-ChildItem ./nupkg/*.nupkg | Select-Object -First 1 -ExpandProperty FullName
          dotnet nuget push $package --source "https://nuget.pkg.github.com/crgolden/index.json" --api-key $env:GITHUB_TOKEN --skip-duplicate

      - name: Tag the release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
